<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gallery Form</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page-container narrow-page">
        <div class="card">
            <h1 th:text="${gallery.id == null} ? 'Create Gallery' : 'Edit Gallery'"></h1>

            <form th:action="@{/galleries/save}" th:object="${gallery}" method="post" class="form-layout">
                <input type="hidden" th:field="*{id}" />

                <div class="form-group">
                    <label for="name">Name</label>
                    <input id="name" type="text" th:field="*{name}" required />
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" th:field="*{description}" rows="5"></textarea>
                </div>

                <div class="button-row">
                    <button type="submit" class="btn primary-btn">Save</button>
                    <a class="btn secondary-btn" th:href="@{/galleries}">Back to Galleries</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
