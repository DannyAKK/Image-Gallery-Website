<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Server Error</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- Error page -->
    <div class="page-container narrow-page" style="text-align: center; padding-top: 80px;">
        <div class="card hero-card">
            <!-- Error code -->
            <h1 style="font-size: 72px; color: #f59e0b; margin-bottom: 8px;">500</h1>

            <!-- Message -->
            <h2>Something Went Wrong</h2>
            <p class="subtitle">An unexpected error occurred on our end. Please try again shortly.</p>

            <!-- Home button -->
            <a class="btn primary-btn" th:href="@{/home}">Go Back Home</a>
        </div>
    </div>
</body>
</html>
