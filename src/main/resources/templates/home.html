<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page-container narrow-page">
        <!-- Home card -->
        <div class="card hero-card home-card">
            <h1>Home</h1>
            <p class="subtitle" th:text="'Welcome, ' + ${username}"></p>

            <!-- Home actions -->
            <div class="home-actions">
                <a class="btn primary-btn" th:href="@{/galleries}">My Galleries</a>

                <!-- Logout form -->
                <form th:action="@{/logout}" method="post" class="inline-form no-margin">
                    <button type="submit" class="btn secondary-btn">Logout</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
