<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page-container auth-page">
        <div class="card auth-card">
            <h1>Login</h1>

            <!-- Status messages -->
            <p th:if="${param.error}" class="message error-message">Invalid username or password</p>
            <p th:if="${param.logout}" class="message success-message">You have been logged out</p>

            <!-- Login form -->
            <form th:action="@{/login}" method="post" class="form-layout">
                <!-- Username -->
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="btn primary-btn full-width-btn">Login</button>
            </form>

            <!-- Register link -->
            <p class="auth-link">
                <a th:href="@{/register}">Create an account</a>
            </p>
        </div>
    </div>
</body>
</html>
