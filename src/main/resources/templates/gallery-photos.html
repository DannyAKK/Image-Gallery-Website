<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gallery Photos</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.css">
</head>
<body>
    <div class="page-container">
        <!-- Top bar -->
        <div class="top-bar">
            <h1 th:text="'Photos in: ' + ${gallery.name}"></h1>
            <a class="btn secondary-btn" th:href="@{/galleries}">Back to Galleries</a>
        </div>

        <!-- Flash messages -->
        <div th:if="${successMessage}" class="flash-message flash-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="flash-message flash-error" th:text="${errorMessage}"></div>

        <!-- Upload form -->
        <div class="card">
            <h2>Upload Photo</h2>
            <form th:action="@{/galleries/{id}/photos/upload(id=${gallery.id})}" method="post" enctype="multipart/form-data" class="upload-form" id="uploadForm">
                <input type="file" name="file" id="fileInput" accept="image/*" required>
                <p class="upload-help">Choose an image, crop it if you want, then upload it.</p>

                <div id="cropContainer" class="crop-container hidden">
                    <div class="crop-preview-wrapper">
                        <img id="cropImage" src="" alt="Image preview for cropping">
                    </div>

                    <div class="crop-actions">
                        <button type="button" class="btn secondary-btn" id="cropBtn">Apply Crop</button>
                        <button type="button" class="btn secondary-btn" id="resetBtn">Reset</button>
                        <button type="submit" class="btn primary-btn">Upload Cropped Photo</button>
                    </div>
                </div>

                <div id="normalUploadActions" class="crop-actions">
                    <button type="submit" class="btn primary-btn">Upload Without Cropping</button>
                </div>
            </form>
        </div>

        <!-- Photos heading -->
        <div class="section-heading">
            <h2>Photos</h2>
        </div>

        <!-- Empty message -->
        <div th:if="${#lists.isEmpty(photos)}" class="card empty-card">
            <p>No photos uploaded yet.</p>
        </div>

        <!-- Photo content -->
        <div th:unless="${#lists.isEmpty(photos)}">
            <!-- Slideshow -->
            <div class="slideshow-container card">
                <h2>Slideshow</h2>
                <div class="slideshow">
                    <div class="slideshow-slide" th:each="photo, iterStat : ${photos}"
                         th:classappend="${iterStat.first} ? ' active' : ''">
                        <img th:src="@{${photo.filePath}}" alt="Slideshow photo" class="slideshow-image">
                    </div>
                </div>
                <div class="slideshow-controls">
                    <button class="btn secondary-btn" type="button" onclick="changeSlide(-1)">&#10094; Prev</button>
                    <span id="slideCounter" class="slide-counter"></span>
                    <button class="btn secondary-btn" type="button" onclick="changeSlide(1)">Next &#10095;</button>
                </div>
            </div>

            <!-- Thumbnail grid -->
            <div class="photo-grid">
                <div class="photo-card" th:each="photo : ${photos}">
                    <img
                        th:src="@{${photo.thumbnailPath}}"
                        alt="Photo thumbnail"
                        class="photo-image"
                        th:data-fullsrc="@{${photo.filePath}}"
                        onclick="openModal(this)"
                        style="cursor: pointer;">
                    <div class="photo-content">
                        <p class="photo-name" th:text="${photo.fileName}"></p>
                        <form th:action="@{/galleries/{galleryId}/photos/{photoId}/delete(galleryId=${gallery.id}, photoId=${photo.id})}" method="post">
                            <button type="submit" class="btn delete-btn">Delete Photo</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Image modal -->
    <div id="imageModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" type="button" onclick="closeModal()">✕</button>
            <img id="modalImage" src="" alt="Full image">
        </div>
    </div>

    <script src="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.js"></script>
    <script>
        let currentSlide = 0;
        let autoplayTimer;
        const slides = document.querySelectorAll('.slideshow-slide');
        const counter = document.getElementById('slideCounter');

        function showSlide(index) {
            if (slides.length === 0) return;
            slides.forEach(s => s.classList.remove('active'));
            currentSlide = (index + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
            counter.textContent = (currentSlide + 1) + ' / ' + slides.length;
        }

        function changeSlide(direction) {
            resetAutoplay();
            showSlide(currentSlide + direction);
        }

        function startAutoplay() {
            autoplayTimer = setInterval(() => showSlide(currentSlide + 1), 3000);
        }

        function resetAutoplay() {
            clearInterval(autoplayTimer);
            startAutoplay();
        }

        if (slides.length > 0) {
            showSlide(0);
            startAutoplay();
        }

        function openModal(img) {
            const fullSrc = img.getAttribute('data-fullsrc');
            document.getElementById('modalImage').src = fullSrc;
            document.getElementById('imageModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
            document.getElementById('modalImage').src = '';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight') changeSlide(1);
        });

        const fileInput = document.getElementById('fileInput');
        const cropContainer = document.getElementById('cropContainer');
        const cropImage = document.getElementById('cropImage');
        const cropBtn = document.getElementById('cropBtn');
        const resetBtn = document.getElementById('resetBtn');
        const normalUploadActions = document.getElementById('normalUploadActions');

        let cropper = null;
        let originalFile = null;

        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            originalFile = file;

            if (!file.type.startsWith('image/')) {
                alert('Please select an image file.');
                fileInput.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                cropImage.src = e.target.result;
                cropContainer.classList.remove('hidden');
                normalUploadActions.classList.add('hidden');

                if (cropper) {
                    cropper.destroy();
                }

                cropper = new Cropper(cropImage, {
                    aspectRatio: NaN,
                    viewMode: 1,
                    autoCropArea: 1,
                    responsive: true,
                    background: false
                });
            };
            reader.readAsDataURL(file);
        });

        cropBtn.addEventListener('click', function() {
            if (!cropper || !originalFile) return;

            const canvas = cropper.getCroppedCanvas();

            canvas.toBlob(function(blob) {
                const croppedFile = new File(
                    [blob],
                    originalFile.name || 'cropped-image.jpg',
                    { type: blob.type || originalFile.type, lastModified: Date.now() }
                );

                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(croppedFile);
                fileInput.files = dataTransfer.files;

                alert('Crop applied. Click "Upload Cropped Photo" to save it.');
            }, originalFile.type || 'image/jpeg');
        });

        resetBtn.addEventListener('click', function() {
            fileInput.value = '';
            cropImage.src = '';
            cropContainer.classList.add('hidden');
            normalUploadActions.classList.remove('hidden');

            if (cropper) {
                cropper.destroy();
                cropper = null;
            }

            originalFile = null;
        });
    </script>
</body>
</html>
